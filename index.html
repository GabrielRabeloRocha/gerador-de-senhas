<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Senhas Ultra-Fortes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>gerador de senhas fortes</h1>
        <div class="result-container">
            <span id="password-display">Clique em Gerar</span>
            <button id="copy-btn" title="Copiar Senha">📋</button>
        </div>
        
        <div class="settings">
            <div class="setting">
                <label>Tamanho da Senha: <span id="length-value">16</span></label>
                <input type="range" id="length-slider" min="8" max="50" value="16">
            </div>
        </div>

        <button id="generate-btn" class="main-btn">Gerar Senha Forte</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
